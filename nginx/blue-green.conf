# Active environment: Blue
upstream active_backend {
    server api-blue:3000;
}

# Standby environment: Green
upstream standby_backend {
    server api-green:3000;
}

server {
    listen 80;

    # Production traffic goes to active backend.
    location / {
        proxy_pass http://active_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Standby-only test endpoint for pre-switch validation.
    location /test-standby/ {
        proxy_pass http://standby_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
